<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky Dodger — Plane Obstacle Game</title>
  <meta name="description" content="Fly your plane through the sky and dodge incoming obstacles! A fun browser-based arcade game.">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
    }

    #gameContainer {
      position: relative;
      width: 900px;
      height: 600px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 0 60px rgba(59, 130, 246, 0.3),
        0 0 120px rgba(139, 92, 246, 0.15),
        inset 0 0 60px rgba(0, 0, 0, 0.3);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(10, 10, 30, 0.85);
      backdrop-filter: blur(8px);
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #overlay h1 {
      font-size: 56px;
      font-weight: 900;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      text-shadow: none;
      letter-spacing: -1px;
    }

    #overlay .subtitle {
      font-size: 18px;
      color: #94a3b8;
      margin-bottom: 36px;
      font-weight: 400;
    }

    #overlay .score-display {
      font-size: 22px;
      color: #e2e8f0;
      margin-bottom: 8px;
      font-weight: 600;
    }

    #overlay .high-score {
      font-size: 16px;
      color: #a78bfa;
      margin-bottom: 32px;
      font-weight: 400;
    }

    #startBtn {
      padding: 16px 48px;
      font-size: 20px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 24px rgba(99, 102, 241, 0.4);
      letter-spacing: 0.5px;
    }

    #startBtn:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.6);
    }

    #startBtn:active {
      transform: translateY(0) scale(0.98);
    }

    .controls-hint {
      margin-top: 24px;
      font-size: 14px;
      color: #64748b;
    }

    .controls-hint kbd {
      background: rgba(255,255,255,0.1);
      padding: 3px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      font-family: 'Outfit', sans-serif;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
      <h1>SKY DODGER</h1>
      <p class="subtitle">Dodge the obstacles. Survive the sky.</p>
      <div id="finalScore" class="score-display" style="display:none;"></div>
      <div id="highScoreDisplay" class="high-score" style="display:none;"></div>
      <button id="startBtn">TAKE OFF</button>
      <p class="controls-hint"><kbd>↑</kbd> <kbd>↓</kbd> or <kbd>W</kbd> <kbd>S</kbd> to fly</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const finalScoreEl = document.getElementById('finalScore');
    const highScoreEl = document.getElementById('highScoreDisplay');

    const W = 900, H = 600;
    canvas.width = W;
    canvas.height = H;

    // ── Game State ──
    let gameRunning = false;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('skyDodgerHigh') || '0');
    let frameCount = 0;
    let difficulty = 1;
    let shakeTimer = 0;
    let shakeIntensity = 0;

    // ── Plane ──
    const plane = {
      x: 120, y: H / 2, w: 60, h: 30,
      vy: 0, targetY: H / 2,
      tilt: 0, trailTimer: 0,
    };

    // ── Input ──
    const keys = {};
    document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    // ── Parallax Layers ──
    let stars = [];
    let farClouds = [];
    let nearClouds = [];
    let mountains = [];

    function initBackground() {
      stars = Array.from({ length: 80 }, () => ({
        x: Math.random() * W, y: Math.random() * H * 0.6,
        size: Math.random() * 2 + 0.5,
        speed: Math.random() * 0.3 + 0.1,
        brightness: Math.random()
      }));

      mountains = [];
      for (let i = 0; i < 8; i++) {
        mountains.push({
          x: i * 160 - 80,
          h: Math.random() * 100 + 60,
          w: Math.random() * 120 + 100,
          color: `hsl(${220 + Math.random() * 20}, 30%, ${12 + Math.random() * 8}%)`
        });
      }

      farClouds = Array.from({ length: 6 }, () => ({
        x: Math.random() * W, y: Math.random() * H * 0.4 + 30,
        w: Math.random() * 120 + 60, h: Math.random() * 30 + 15,
        speed: Math.random() * 0.3 + 0.2, opacity: Math.random() * 0.15 + 0.05
      }));

      nearClouds = Array.from({ length: 4 }, () => ({
        x: Math.random() * W, y: Math.random() * H * 0.5 + 20,
        w: Math.random() * 80 + 40, h: Math.random() * 25 + 12,
        speed: Math.random() * 0.6 + 0.4, opacity: Math.random() * 0.08 + 0.03
      }));
    }

    // ── Obstacles ──
    let obstacles = [];
    const obstacleTypes = ['building', 'missile', 'bird', 'helicopter'];

    function spawnObstacle() {
      const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
      const speed = (3 + difficulty * 0.5 + Math.random() * 2);

      if (type === 'building') {
        const fromTop = Math.random() < 0.5;
        const h = Math.random() * 180 + 100;
        obstacles.push({
          type, x: W + 10, y: fromTop ? 0 : H - h,
          w: 50 + Math.random() * 30, h,
          speed, fromTop,
          color: `hsl(${220 + Math.random() * 40}, 40%, ${18 + Math.random() * 12}%)`
        });
      } else if (type === 'missile') {
        obstacles.push({
          type, x: W + 10, y: Math.random() * (H - 80) + 40,
          w: 48, h: 14, speed: speed + 2,
          wobble: 0, wobbleSpeed: Math.random() * 0.08 + 0.03
        });
      } else if (type === 'bird') {
        obstacles.push({
          type, x: W + 10, y: Math.random() * (H - 100) + 50,
          w: 32, h: 20, speed: speed + 1,
          wingPhase: 0
        });
      } else if (type === 'helicopter') {
        obstacles.push({
          type, x: W + 10, y: Math.random() * (H - 120) + 60,
          w: 56, h: 32, speed: speed - 0.5,
          bladeAngle: 0
        });
      }
    }

    // ── Particles ──
    let particles = [];
    let engineTrail = [];

    function addParticle(x, y, color, count = 5, spread = 3) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * spread * 2,
          vy: (Math.random() - 0.5) * spread * 2,
          life: 1,
          decay: Math.random() * 0.03 + 0.02,
          size: Math.random() * 4 + 2,
          color
        });
      }
    }

    function addExplosion(x, y) {
      const colors = ['#f97316', '#ef4444', '#fbbf24', '#ffffff'];
      for (let i = 0; i < 30; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 6 + 1;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          decay: Math.random() * 0.02 + 0.01,
          size: Math.random() * 6 + 2,
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }
      shakeTimer = 15;
      shakeIntensity = 8;
    }

    // ── Drawing ──
    function drawBackground() {
      // Sky gradient
      const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, '#0f0f2e');
      skyGrad.addColorStop(0.4, '#1a1a4e');
      skyGrad.addColorStop(0.7, '#2d1b69');
      skyGrad.addColorStop(1, '#1a1030');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, H);

      // Stars
      stars.forEach(s => {
        const flicker = 0.6 + Math.sin(frameCount * 0.02 + s.brightness * 10) * 0.4;
        ctx.globalAlpha = flicker * 0.7;
        ctx.fillStyle = '#e2e8f0';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
        s.x -= s.speed;
        if (s.x < -5) s.x = W + 5;
      });
      ctx.globalAlpha = 1;

      // Mountains
      mountains.forEach(m => {
        ctx.fillStyle = m.color;
        ctx.beginPath();
        ctx.moveTo(m.x, H);
        ctx.lineTo(m.x + m.w / 2, H - m.h);
        ctx.lineTo(m.x + m.w, H);
        ctx.closePath();
        ctx.fill();
        m.x -= 0.3;
        if (m.x < -m.w) m.x = W + Math.random() * 100;
      });

      // Far clouds
      farClouds.forEach(c => {
        ctx.globalAlpha = c.opacity;
        ctx.fillStyle = '#94a3b8';
        ctx.beginPath();
        ctx.ellipse(c.x, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(c.x - c.w * 0.3, c.y + 5, c.w * 0.3, c.h * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(c.x + c.w * 0.25, c.y + 3, c.w * 0.25, c.h * 0.35, 0, 0, Math.PI * 2);
        ctx.fill();
        c.x -= c.speed;
        if (c.x < -c.w) { c.x = W + c.w; c.y = Math.random() * H * 0.4 + 30; }
      });
      ctx.globalAlpha = 1;
    }

    function drawPlane() {
      ctx.save();
      ctx.translate(plane.x, plane.y);
      ctx.rotate(plane.tilt);

      // Engine glow
      const glowGrad = ctx.createRadialGradient(-30, 0, 2, -30, 0, 20);
      glowGrad.addColorStop(0, 'rgba(251, 191, 36, 0.6)');
      glowGrad.addColorStop(0.5, 'rgba(245, 158, 11, 0.2)');
      glowGrad.addColorStop(1, 'rgba(245, 158, 11, 0)');
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.arc(-30, 0, 20, 0, Math.PI * 2);
      ctx.fill();

      // Engine flame
      const flameLen = 12 + Math.sin(frameCount * 0.5) * 6;
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.moveTo(-28, -4);
      ctx.lineTo(-28 - flameLen, 0);
      ctx.lineTo(-28, 4);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#f97316';
      ctx.beginPath();
      ctx.moveTo(-28, -2);
      ctx.lineTo(-28 - flameLen * 0.6, 0);
      ctx.lineTo(-28, 2);
      ctx.closePath();
      ctx.fill();

      // Body
      ctx.fillStyle = '#e2e8f0';
      ctx.beginPath();
      ctx.moveTo(30, 0);
      ctx.quadraticCurveTo(25, -8, -5, -8);
      ctx.lineTo(-28, -4);
      ctx.lineTo(-28, 4);
      ctx.lineTo(-5, 8);
      ctx.quadraticCurveTo(25, 8, 30, 0);
      ctx.closePath();
      ctx.fill();

      // Body highlight
      ctx.fillStyle = 'rgba(148, 163, 184, 0.4)';
      ctx.beginPath();
      ctx.moveTo(28, -1);
      ctx.quadraticCurveTo(20, -7, -5, -7);
      ctx.lineTo(-5, -3);
      ctx.quadraticCurveTo(20, -3, 28, -1);
      ctx.closePath();
      ctx.fill();

      // Cockpit
      const cockpitGrad = ctx.createLinearGradient(12, -6, 12, 0);
      cockpitGrad.addColorStop(0, '#60a5fa');
      cockpitGrad.addColorStop(1, '#3b82f6');
      ctx.fillStyle = cockpitGrad;
      ctx.beginPath();
      ctx.ellipse(15, -2, 8, 5, -0.2, Math.PI, 0);
      ctx.fill();

      // Wings
      ctx.fillStyle = '#cbd5e1';
      // Top wing
      ctx.beginPath();
      ctx.moveTo(5, -6);
      ctx.lineTo(-8, -22);
      ctx.lineTo(-15, -20);
      ctx.lineTo(-5, -6);
      ctx.closePath();
      ctx.fill();
      // Bottom wing
      ctx.beginPath();
      ctx.moveTo(5, 6);
      ctx.lineTo(-8, 22);
      ctx.lineTo(-15, 20);
      ctx.lineTo(-5, 6);
      ctx.closePath();
      ctx.fill();

      // Tail
      ctx.fillStyle = '#94a3b8';
      ctx.beginPath();
      ctx.moveTo(-24, -4);
      ctx.lineTo(-32, -14);
      ctx.lineTo(-36, -12);
      ctx.lineTo(-28, -4);
      ctx.closePath();
      ctx.fill();

      // Wing stripe (accent)
      ctx.fillStyle = '#ef4444';
      ctx.fillRect(-10, -7, 12, 2);
      ctx.fillRect(-10, 6, 12, 2);

      ctx.restore();
    }

    function drawObstacle(ob) {
      if (ob.type === 'building') {
        // Building body
        ctx.fillStyle = ob.color;
        ctx.fillRect(ob.x, ob.y, ob.w, ob.h);

        // Windows
        ctx.fillStyle = 'rgba(251, 191, 36, 0.6)';
        const rows = Math.floor(ob.h / 25);
        const cols = Math.floor(ob.w / 18);
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            if (Math.sin(r * 3.7 + c * 5.1 + ob.x * 0.01) > -0.3) {
              const wy = ob.fromTop ? ob.y + 10 + r * 25 : ob.y + ob.h - 20 - r * 25;
              ctx.fillRect(ob.x + 6 + c * 18, wy, 8, 12);
            }
          }
        }

        // Building top highlight
        if (ob.fromTop) {
          ctx.fillStyle = 'rgba(255,255,255,0.05)';
          ctx.fillRect(ob.x, ob.y + ob.h - 3, ob.w, 3);
        } else {
          ctx.fillStyle = 'rgba(255,255,255,0.05)';
          ctx.fillRect(ob.x, ob.y, ob.w, 3);
        }

        // Antenna on tall buildings
        if (ob.h > 200) {
          ctx.strokeStyle = '#64748b';
          ctx.lineWidth = 2;
          const tipY = ob.fromTop ? ob.y + ob.h : ob.y;
          const dir = ob.fromTop ? 1 : -1;
          ctx.beginPath();
          ctx.moveTo(ob.x + ob.w / 2, tipY);
          ctx.lineTo(ob.x + ob.w / 2, tipY - dir * 20);
          ctx.stroke();

          // Blinking light
          if (Math.sin(frameCount * 0.1) > 0) {
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(ob.x + ob.w / 2, tipY - dir * 20, 3, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      else if (ob.type === 'missile') {
        ob.wobble += ob.wobbleSpeed;
        const wy = ob.y + Math.sin(ob.wobble) * 15;

        // Missile trail
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#94a3b8';
        for (let i = 1; i <= 4; i++) {
          ctx.beginPath();
          ctx.ellipse(ob.x + ob.w + i * 10, wy, 4 + i * 2, 3, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Body
        ctx.fillStyle = '#64748b';
        ctx.beginPath();
        ctx.moveTo(ob.x, wy);
        ctx.lineTo(ob.x + ob.w - 10, wy - ob.h / 2);
        ctx.lineTo(ob.x + ob.w, wy);
        ctx.lineTo(ob.x + ob.w - 10, wy + ob.h / 2);
        ctx.closePath();
        ctx.fill();

        // Nose
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.moveTo(ob.x, wy);
        ctx.lineTo(ob.x + 8, wy - 3);
        ctx.lineTo(ob.x + 8, wy + 3);
        ctx.closePath();
        ctx.fill();

        // Fins
        ctx.fillStyle = '#475569';
        ctx.beginPath();
        ctx.moveTo(ob.x + ob.w - 5, wy - ob.h / 2);
        ctx.lineTo(ob.x + ob.w + 5, wy - ob.h / 2 - 6);
        ctx.lineTo(ob.x + ob.w, wy);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(ob.x + ob.w - 5, wy + ob.h / 2);
        ctx.lineTo(ob.x + ob.w + 5, wy + ob.h / 2 + 6);
        ctx.lineTo(ob.x + ob.w, wy);
        ctx.closePath();
        ctx.fill();

        // Update hitbox y for collision
        ob._renderY = wy;
      }

      else if (ob.type === 'bird') {
        ob.wingPhase += 0.15;
        const wingY = Math.sin(ob.wingPhase) * 8;

        ctx.fillStyle = '#1e293b';
        // Body
        ctx.beginPath();
        ctx.ellipse(ob.x + ob.w / 2, ob.y, ob.w / 3, ob.h / 3, 0, 0, Math.PI * 2);
        ctx.fill();

        // Wings
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(ob.x + ob.w / 2, ob.y);
        ctx.quadraticCurveTo(ob.x + ob.w / 2 - 10, ob.y + wingY - 10, ob.x, ob.y + wingY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(ob.x + ob.w / 2, ob.y);
        ctx.quadraticCurveTo(ob.x + ob.w / 2 + 10, ob.y + wingY - 10, ob.x + ob.w, ob.y + wingY);
        ctx.stroke();

        // Eye
        ctx.fillStyle = '#fbbf24';
        ctx.beginPath();
        ctx.arc(ob.x + ob.w / 2 - 5, ob.y - 3, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      else if (ob.type === 'helicopter') {
        ob.bladeAngle += 0.3;

        // Body
        ctx.fillStyle = '#374151';
        ctx.beginPath();
        ctx.ellipse(ob.x + ob.w / 2, ob.y, ob.w / 2, ob.h / 2.5, 0, 0, Math.PI * 2);
        ctx.fill();

        // Cockpit glass
        ctx.fillStyle = 'rgba(96, 165, 250, 0.5)';
        ctx.beginPath();
        ctx.ellipse(ob.x + 12, ob.y - 2, 10, 8, -0.3, Math.PI, 0);
        ctx.fill();

        // Tail
        ctx.fillStyle = '#4b5563';
        ctx.beginPath();
        ctx.moveTo(ob.x + ob.w - 10, ob.y - 3);
        ctx.lineTo(ob.x + ob.w + 20, ob.y - 8);
        ctx.lineTo(ob.x + ob.w + 20, ob.y + 4);
        ctx.lineTo(ob.x + ob.w - 10, ob.y + 3);
        ctx.closePath();
        ctx.fill();

        // Tail rotor
        ctx.strokeStyle = '#9ca3af';
        ctx.lineWidth = 2;
        const trx = ob.x + ob.w + 20;
        const try_ = ob.y - 2;
        ctx.beginPath();
        ctx.moveTo(trx, try_ - 8 * Math.cos(ob.bladeAngle * 2));
        ctx.lineTo(trx, try_ + 8 * Math.cos(ob.bladeAngle * 2));
        ctx.stroke();

        // Main rotor
        ctx.strokeStyle = 'rgba(156, 163, 175, 0.6)';
        ctx.lineWidth = 2;
        const rx = ob.x + ob.w / 2;
        const ry = ob.y - ob.h / 2.5 - 2;
        ctx.beginPath();
        ctx.moveTo(rx - 30 * Math.cos(ob.bladeAngle), ry);
        ctx.lineTo(rx + 30 * Math.cos(ob.bladeAngle), ry);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(rx - 30 * Math.cos(ob.bladeAngle + Math.PI / 2), ry);
        ctx.lineTo(rx + 30 * Math.cos(ob.bladeAngle + Math.PI / 2), ry);
        ctx.stroke();

        // Skids
        ctx.strokeStyle = '#6b7280';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(ob.x + 8, ob.y + ob.h / 2.5);
        ctx.lineTo(ob.x + 8, ob.y + ob.h / 2.5 + 6);
        ctx.lineTo(ob.x + ob.w - 8, ob.y + ob.h / 2.5 + 6);
        ctx.lineTo(ob.x + ob.w - 8, ob.y + ob.h / 2.5);
        ctx.stroke();
      }
    }

    function drawHUD() {
      // Score
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = '700 28px Outfit';
      ctx.textAlign = 'left';
      ctx.fillText(`${Math.floor(score)}`, 24, 42);

      ctx.font = '400 14px Outfit';
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText('SCORE', 24, 58);

      // High score
      ctx.textAlign = 'right';
      ctx.font = '600 18px Outfit';
      ctx.fillStyle = 'rgba(167, 139, 250, 0.8)';
      ctx.fillText(`BEST: ${highScore}`, W - 24, 42);

      // Difficulty indicator
      ctx.textAlign = 'right';
      ctx.font = '400 13px Outfit';
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillText(`LEVEL ${Math.floor(difficulty)}`, W - 24, 60);
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;

      // Engine trail
      engineTrail.forEach((t, i) => {
        ctx.globalAlpha = t.life * 0.4;
        ctx.fillStyle = '#f97316';
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.size * t.life, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    function drawNearClouds() {
      nearClouds.forEach(c => {
        ctx.globalAlpha = c.opacity;
        ctx.fillStyle = '#cbd5e1';
        ctx.beginPath();
        ctx.ellipse(c.x, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        c.x -= c.speed;
        if (c.x < -c.w) { c.x = W + c.w; c.y = Math.random() * H * 0.5 + 20; }
      });
      ctx.globalAlpha = 1;
    }

    // ── Collision Detection ──
    function checkCollision(ob) {
      // Plane hitbox (slightly smaller than visual)
      const px = plane.x - 20;
      const py = plane.y - 14;
      const pw = 50;
      const ph = 28;

      if (ob.type === 'building') {
        return px + pw > ob.x && px < ob.x + ob.w &&
               py + ph > ob.y && py < ob.y + ob.h;
      }
      if (ob.type === 'missile') {
        const my = ob._renderY || ob.y;
        return px + pw > ob.x && px < ob.x + ob.w &&
               py + ph > my - ob.h && py < my + ob.h;
      }
      if (ob.type === 'bird') {
        const dx = (plane.x) - (ob.x + ob.w / 2);
        const dy = (plane.y) - ob.y;
        return Math.sqrt(dx * dx + dy * dy) < 22;
      }
      if (ob.type === 'helicopter') {
        return px + pw > ob.x && px < ob.x + ob.w &&
               py + ph > ob.y - ob.h / 2 && py < ob.y + ob.h / 2;
      }
      return false;
    }

    // ── Game Loop ──
    let spawnTimer = 0;
    let lastTime = 0;

    function resetGame() {
      plane.y = H / 2;
      plane.vy = 0;
      plane.tilt = 0;
      obstacles = [];
      particles = [];
      engineTrail = [];
      score = 0;
      frameCount = 0;
      difficulty = 1;
      spawnTimer = 0;
      shakeTimer = 0;
    }

    function update() {
      frameCount++;
      score += 0.05 * difficulty;
      difficulty = 1 + Math.floor(score / 50) * 0.5;

      // Input
      const moveSpeed = 5;
      if (keys['ArrowUp'] || keys['w'] || keys['W']) {
        plane.vy -= 0.6;
      }
      if (keys['ArrowDown'] || keys['s'] || keys['S']) {
        plane.vy += 0.6;
      }

      // Gravity-like drift + damping
      plane.vy *= 0.92;
      plane.y += plane.vy;

      // Boundaries
      if (plane.y < 25) { plane.y = 25; plane.vy = 0; }
      if (plane.y > H - 25) { plane.y = H - 25; plane.vy = 0; }

      // Tilt based on velocity
      plane.tilt += (plane.vy * 0.04 - plane.tilt) * 0.15;

      // Engine trail
      if (frameCount % 2 === 0) {
        const cos = Math.cos(plane.tilt);
        const sin = Math.sin(plane.tilt);
        engineTrail.push({
          x: plane.x - 30 * cos, y: plane.y - 30 * -sin + (Math.random() - 0.5) * 4,
          size: Math.random() * 3 + 2,
          life: 1
        });
      }

      // Update engine trail
      engineTrail.forEach(t => { t.life -= 0.04; t.x -= 1.5; });
      engineTrail = engineTrail.filter(t => t.life > 0);

      // Spawn obstacles
      const spawnRate = Math.max(40, 90 - difficulty * 8);
      spawnTimer++;
      if (spawnTimer >= spawnRate) {
        spawnObstacle();
        spawnTimer = 0;
      }

      // Update obstacles
      obstacles.forEach(ob => { ob.x -= ob.speed; });
      obstacles = obstacles.filter(ob => ob.x > -100);

      // Collision
      for (const ob of obstacles) {
        if (checkCollision(ob)) {
          addExplosion(plane.x, plane.y);
          gameOver();
          return;
        }
      }

      // Update particles
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        p.vy += 0.05; // gravity
      });
      particles = particles.filter(p => p.life > 0);

      // Screen shake
      if (shakeTimer > 0) shakeTimer--;
    }

    function draw() {
      ctx.save();

      // Screen shake
      if (shakeTimer > 0) {
        const sx = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 15);
        const sy = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 15);
        ctx.translate(sx, sy);
      }

      drawBackground();
      drawParticles();

      obstacles.forEach(ob => drawObstacle(ob));

      drawPlane();
      drawNearClouds();
      drawHUD();

      ctx.restore();
    }

    function gameLoop(timestamp) {
      if (!gameRunning) return;

      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    function gameOver() {
      gameRunning = false;

      // Still draw the explosion
      const explosionDraw = () => {
        particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.life -= p.decay;
          p.vy += 0.05;
        });
        particles = particles.filter(p => p.life > 0);

        draw();

        if (particles.length > 0) {
          requestAnimationFrame(explosionDraw);
        } else {
          showOverlay();
        }
      };
      requestAnimationFrame(explosionDraw);

      const finalScore = Math.floor(score);
      if (finalScore > highScore) {
        highScore = finalScore;
        localStorage.setItem('skyDodgerHigh', highScore.toString());
      }
    }

    function showOverlay() {
      finalScoreEl.style.display = 'block';
      finalScoreEl.textContent = `Score: ${Math.floor(score)}`;
      highScoreEl.style.display = 'block';
      highScoreEl.textContent = `Best: ${highScore}`;
      startBtn.textContent = 'FLY AGAIN';
      overlay.classList.remove('hidden');
    }

    startBtn.addEventListener('click', () => {
      resetGame();
      overlay.classList.add('hidden');
      gameRunning = true;
      requestAnimationFrame(gameLoop);
    });

    // ── Init ──
    initBackground();
    draw(); // draw initial frame
  </script>
</body>
</html>
